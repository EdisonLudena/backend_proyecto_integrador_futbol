openapi: 3.0.3
info:
  title: Backend Proyecto Integrador Fútbol
  description: |
    API REST para gestión integral de entidades deportivas de fútbol.
    Cubre autenticación, jugadores, partidos, scouting, salud y rendimiento.
  version: "1.0"
servers:
  - url:  http://localhost:8000/api
    description: Desarrollo local

tags:
  - name: Auth
    description: Registro, login y gestión de sesiones
  - name: Users
    description: Gestión de usuarios (solo admin)
  - name: Suscripciones
    description: Planes de suscripción
  - name: Entidades
    description: Clubes / organizaciones deportivas
  - name: Sedes
    description: Instalaciones de las entidades
  - name: Categorías
    description: Categorías y divisiones de un club
  - name: Posiciones
    description: Catálogo de posiciones de juego
  - name: Jugadores
    description: Registro y gestión de jugadores
  - name: Jugador-Posiciones
    description: Asignación de posiciones a jugadores
  - name: Representantes
    description: Agentes y contactos de emergencia de jugadores
  - name: Partidos
    description: Programación y resultados de partidos
  - name: Alineaciones
    description: Participación de jugadores en un partido
  - name: Eventos Live
    description: Eventos en tiempo real durante un partido
  - name: Evaluación Post-Partido
    description: Calificación de jugadores tras el partido
  - name: Scouting
    description: Prospectos y reportes de scouting
  - name: Métricas Técnicas
    description: Puntuación técnica individual por reporte
  - name: Métricas Tácticas
    description: Puntuación táctica individual por reporte
  - name: Valoración Económica
    description: Historial de valor de mercado de jugadores
  - name: Contratos
    description: Contratos internos de jugadores
  - name: Salud
    description: Antecedentes de salud de jugadores
  - name: Antropometría
    description: Historial antropométrico (peso, talla, IMC)
  - name: Rendimiento
    description: Tests físicos de rendimiento
  - name: Lesiones
    description: Registro de lesiones
  - name: Rehabilitación
    description: Sesiones de rehabilitación vinculadas a lesiones
  - name: Dietas
    description: Planes alimenticios de jugadores
  - name: Health
    description: Estado del servicio

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Auth ───────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [email, nombre_completo, tipo_usuario, password]
      properties:
        email: { type: string, format: email }
        nombre_completo: { type: string, maxLength: 150 }
        tipo_usuario:
          type: string
          enum: [Coach, Scout, Player]
        password: { type: string, format: password }

    AuthResponse:
      type: object
      properties:
        access: { type: string }
        refresh: { type: string }
        user_id: { type: string, format: uuid }
        email: { type: string }
        nombre_completo: { type: string }
        tipo_usuario: { type: string }
        is_staff: { type: boolean }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }

    TokenRefreshRequest:
      type: object
      required: [refresh]
      properties:
        refresh: { type: string }

    TokenRefreshResponse:
      type: object
      properties:
        access: { type: string }

    LogoutRequest:
      type: object
      required: [refresh]
      properties:
        refresh: { type: string }

    # ── Users ──────────────────────────────────────────────
    Usuario:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        email: { type: string, format: email }
        nombre_completo: { type: string, maxLength: 150 }
        tipo_usuario:
          type: string
          enum: [Coach, Scout, Player]
        estado:
          type: string
          enum: [Activo, Inactivo, Suspendido]
        fecha_registro: { type: string, format: date-time, readOnly: true }
        ultimo_login: { type: string, format: date-time, nullable: true }
        idioma: { type: string, default: es }
        unidad_medida:
          type: string
          enum: [Metrico, Imperial]
        notificaciones_activas: { type: boolean }
        is_staff: { type: boolean }
        is_active: { type: boolean }

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password: { type: string }
        new_password: { type: string }

    UserStats:
      type: object
      properties:
        total: { type: integer }
        active: { type: integer }
        inactive: { type: integer }
        staff: { type: integer }

    # ── Suscripcion ────────────────────────────────────────
    Suscripcion:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        usuario: { type: string, format: uuid }
        email_usuario: { type: string, readOnly: true }
        plan:
          type: string
          enum: [Basico, Premium]
        estado:
          type: string
          enum: [Activo, Cancelado, Vencido, Suspendido]
        fecha_inicio: { type: string, format: date, readOnly: true }
        fecha_vencimiento: { type: string, format: date }
        metodo_pago: { type: string, nullable: true }
        referencia_pago: { type: string, nullable: true }
        creado_en: { type: string, format: date-time, readOnly: true }

    SuscripcionStats:
      type: object
      properties:
        total_suscripciones: { type: integer }
        activas: { type: integer }
        canceladas: { type: integer }
        vencidas: { type: integer }
        premium: { type: integer }
        basico: { type: integer }

    # ── Entidad ────────────────────────────────────────────
    Entidad:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        usuario: { type: string, format: uuid }
        email_creador: { type: string, readOnly: true }
        nombre_entidad: { type: string, maxLength: 150 }
        logo_url: { type: string, nullable: true }
        ciudad: { type: string, nullable: true }
        pais: { type: string, default: Ecuador }
        telefono_contacto: { type: string, nullable: true }
        estado:
          type: string
          enum: [Activo, Inactivo]
        creado_en: { type: string, format: date-time, readOnly: true }

    EntidadStats:
      type: object
      properties:
        total_entidades: { type: integer }
        activas: { type: integer }
        inactivas: { type: integer }
        top_ciudades:
          type: array
          items:
            type: object
            properties:
              ciudad: { type: string }
              total: { type: integer }

    # ── Sede ───────────────────────────────────────────────
    Sede:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        entidad: { type: string, format: uuid }
        nombre_entidad: { type: string, readOnly: true }
        nombre_sede: { type: string, maxLength: 150 }
        direccion: { type: string, nullable: true }
        latitud: { type: number, format: double, nullable: true }
        longitud: { type: number, format: double, nullable: true }
        capacidad: { type: integer, nullable: true }
        tipo_superficie: { type: string, nullable: true }

    # ── Categoria ──────────────────────────────────────────
    Categoria:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        entidad: { type: string, format: uuid }
        nombre_entidad: { type: string, readOnly: true }
        nombre: { type: string, maxLength: 100 }
        edad_minima: { type: integer, nullable: true }
        edad_maxima: { type: integer, nullable: true }
        genero:
          type: string
          enum: [Masculino, Femenino, Mixto]
        activo: { type: boolean, default: true }

    # ── Posicion ───────────────────────────────────────────
    Posicion:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        nombre_posicion: { type: string, maxLength: 80 }
        abreviatura: { type: string, maxLength: 10, nullable: true }
        zona:
          type: string
          enum: [Porteria, Defensa, Mediocampo, Ataque]

    # ── Jugador ────────────────────────────────────────────
    Jugador:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        entidad: { type: string, format: uuid }
        nombre_entidad: { type: string, readOnly: true }
        categoria: { type: string, format: uuid, nullable: true }
        nombre_categoria: { type: string, readOnly: true, nullable: true }
        nombres: { type: string, maxLength: 100 }
        apellidos: { type: string, maxLength: 100 }
        fecha_nacimiento: { type: string, format: date }
        foto_url: { type: string, format: uri, nullable: true }
        numero_camiseta: { type: integer, minimum: 1, maximum: 99, nullable: true }
        pie_dominante:
          type: string
          enum: [Derecho, Izquierdo, Ambidiestro]
        nacionalidad: { type: string, nullable: true }
        documento_identidad: { type: string, nullable: true }
        estado:
          type: string
          enum: [Activo, Lesionado, Suspendido, Inactivo]
        creado_en: { type: string, format: date-time, readOnly: true }

    # ── JugadorPosicion ────────────────────────────────────
    JugadorPosicion:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        jugador: { type: string, format: uuid }
        nombre_jugador: { type: string, readOnly: true }
        apellido_jugador: { type: string, readOnly: true }
        posicion: { type: string, format: uuid }
        nombre_posicion: { type: string, readOnly: true }
        abreviatura_posicion: { type: string, readOnly: true }
        es_principal: { type: boolean, default: false }

    # ── Representante ──────────────────────────────────────
    Representante:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        jugador: { type: string, format: uuid }
        nombre_jugador: { type: string, readOnly: true }
        apellido_jugador: { type: string, readOnly: true }
        nombre: { type: string, maxLength: 150 }
        telefono: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        parentesco: { type: string, nullable: true }
        es_contacto_emergencia: { type: boolean }
        es_agente: { type: boolean }

    # ── Partido ────────────────────────────────────────────
    Partido:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        categoria: { type: string, format: uuid }
        sede: { type: string, format: uuid, nullable: true }
        rival: { type: string, maxLength: 150 }
        es_local: { type: boolean }
        fecha: { type: string, format: date-time }
        tipo_partido:
          type: string
          enum: [Liga, Copa, Amistoso, Torneo, Playoffs]
        goles_favor: { type: integer }
        goles_contra: { type: integer }
        resultado_final: { type: string, nullable: true }
        estado_partido:
          type: string
          enum: [Programado, En curso, Finalizado, Suspendido, Aplazado]
        observaciones: { type: string, nullable: true }

    # ── Alineacion ─────────────────────────────────────────
    Alineacion:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        partido: { type: string, format: uuid }
        jugador: { type: string, format: uuid }
        es_titular: { type: boolean }
        posicion_partido: { type: string, format: uuid, nullable: true }
        minuto_entrada: { type: integer }
        minuto_salida: { type: integer }
        minutos_jugados: { type: integer, readOnly: true }

    # ── EventoLive ─────────────────────────────────────────
    EventoLive:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        partido: { type: string, format: uuid }
        jugador: { type: string, format: uuid }
        jugador_secundario: { type: string, format: uuid, nullable: true }
        minuto: { type: integer }
        tipo_evento:
          type: string
          enum:
            - Gol
            - Autogol
            - Asistencia
            - Tarjeta amarilla
            - Tarjeta roja
            - Doble amarilla
            - Penalti anotado
            - Penalti fallado
            - Cambio entrada
            - Cambio salida
            - Lesion
        descripcion: { type: string, nullable: true }
        creado_en: { type: string, format: date-time, readOnly: true }

    # ── EvaluacionPostPartido ──────────────────────────────
    EvaluacionPostPartido:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        partido: { type: string, format: uuid }
        jugador: { type: string, format: uuid }
        calificacion:
          type: number
          format: decimal
          minimum: 1.0
          maximum: 10.0
        puntos_positivos: { type: string, nullable: true }
        puntos_a_mejorar: { type: string, nullable: true }
        es_visible_jugador: { type: boolean }
        creado_en: { type: string, format: date-time, readOnly: true }

    # ── ProspectoSeguimiento ───────────────────────────────
    ProspectoSeguimiento:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        usuario: { type: string, format: uuid }
        jugador: { type: string, format: uuid, nullable: true }
        nombre_jugador: { type: string, nullable: true }
        equipo_actual: { type: string, nullable: true }
        posicion: { type: string, format: uuid, nullable: true }
        fecha_nacimiento: { type: string, format: date, nullable: true }
        nacionalidad: { type: string, nullable: true }
        estado:
          type: string
          enum: [Seguimiento, Contactado, En evaluación, Oferta enviada, Reclutado, Descartado]
        fecha_primer_contacto: { type: string, format: date, nullable: true }
        observaciones: { type: string, nullable: true }
        creado_en: { type: string, format: date-time, readOnly: true }

    # ── ReporteScouting ────────────────────────────────────
    ReporteScouting:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        usuario: { type: string, format: uuid }
        jugador: { type: string, format: uuid, nullable: true }
        prospecto: { type: string, format: uuid, nullable: true }
        valoracion_estrellas:
          type: integer
          minimum: 1
          maximum: 5
        comentario_tecnico: { type: string, nullable: true }
        partido_observado: { type: string, nullable: true }
        fecha_reporte: { type: string, format: date }

    # ── MetricaTecnica ─────────────────────────────────────
    MetricaTecnica:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        reporte: { type: string, format: uuid }
        control: { type: integer, minimum: 1, maximum: 100, nullable: true }
        pase_corto: { type: integer, minimum: 1, maximum: 100, nullable: true }
        pase_largo: { type: integer, minimum: 1, maximum: 100, nullable: true }
        tiro: { type: integer, minimum: 1, maximum: 100, nullable: true }
        regate: { type: integer, minimum: 1, maximum: 100, nullable: true }
        cabeceo: { type: integer, minimum: 1, maximum: 100, nullable: true }
        velocidad: { type: integer, minimum: 1, maximum: 100, nullable: true }
        resistencia: { type: integer, minimum: 1, maximum: 100, nullable: true }
        puntaje_tecnico: { type: number, format: decimal, readOnly: true }

    # ── MetricaTactica ─────────────────────────────────────
    MetricaTactica:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        reporte: { type: string, format: uuid }
        ubicacion: { type: integer, minimum: 1, maximum: 100, nullable: true }
        lectura_juego: { type: integer, minimum: 1, maximum: 100, nullable: true }
        sacrificio: { type: integer, minimum: 1, maximum: 100, nullable: true }
        liderazgo: { type: integer, minimum: 1, maximum: 100, nullable: true }
        presion: { type: integer, minimum: 1, maximum: 100, nullable: true }
        trabajo_equipo: { type: integer, minimum: 1, maximum: 100, nullable: true }
        puntaje_tactico: { type: number, format: decimal, readOnly: true }

    # ── ValoracionEconomica ────────────────────────────────
    ValoracionEconomica:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        jugador: { type: string, format: uuid }
        valor_estimado: { type: number, format: decimal }
        moneda: { type: string, default: USD }
        fecha_valoracion: { type: string, format: date }
        metodo_valoracion: { type: string, nullable: true }
        observaciones: { type: string, nullable: true }

    # ── ContratoInterno ────────────────────────────────────
    ContratoInterno:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        jugador: { type: string, format: uuid }
        tipo_contrato:
          type: string
          enum: [Beca, Profesional, Amateur, Prueba]
        monto: { type: number, format: decimal, nullable: true }
        moneda: { type: string, default: USD }
        fecha_inicio: { type: string, format: date }
        fecha_fin: { type: string, format: date, nullable: true }
        descripcion: { type: string, nullable: true }
        archivo_url: { type: string, format: uri, nullable: true }
        creado_en: { type: string, format: date-time, readOnly: true }

    # ── AntecedentesSalud ──────────────────────────────────
    AntecedentesSalud:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        jugador: { type: string, format: uuid }
        tipo_sangre:
          type: string
          enum: [A+, A-, B+, B-, AB+, AB-, O+, O-]
          nullable: true
        alergias: { type: string, nullable: true }
        medicamentos_regulares: { type: string, nullable: true }
        condiciones_cronicas: { type: string, nullable: true }
        contacto_medico_nombre: { type: string, nullable: true }
        contacto_medico_tel: { type: string, nullable: true }
        actualizado_en: { type: string, format: date-time, readOnly: true }

    # ── HistorialAntropometrico ────────────────────────────
    HistorialAntropometrico:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        jugador: { type: string, format: uuid }
        peso_kg: { type: number, format: decimal }
        altura_cm: { type: number, format: decimal }
        grasa_corporal: { type: number, format: decimal, nullable: true }
        masa_muscular: { type: number, format: decimal, nullable: true }
        imc: { type: number, format: decimal, readOnly: true }
        fecha_toma: { type: string, format: date }
        observaciones: { type: string, nullable: true }

    # ── TestRendimiento ────────────────────────────────────
    TestRendimiento:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        jugador: { type: string, format: uuid }
        velocidad_30m_seg: { type: number, format: decimal, nullable: true }
        velocidad_60m_seg: { type: number, format: decimal, nullable: true }
        salto_vertical_cm: { type: integer, nullable: true }
        salto_horizontal_cm: { type: integer, nullable: true }
        resistencia_vo2max: { type: number, format: decimal, nullable: true }
        resistencia_nivel: { type: integer, nullable: true }
        flexibilidad_cm: { type: integer, nullable: true }
        agilidad_seg: { type: number, format: decimal, nullable: true }
        fecha_test: { type: string, format: date }
        observaciones: { type: string, nullable: true }

    # ── LesionRegistro ─────────────────────────────────────
    LesionRegistro:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        jugador: { type: string, format: uuid }
        descripcion: { type: string }
        zona_cuerpo: { type: string, maxLength: 80 }
        tipo_lesion: { type: string, nullable: true }
        gravedad:
          type: string
          enum: [Leve, Moderada, Grave]
          nullable: true
        fecha_inicio: { type: string, format: date }
        fecha_alta: { type: string, format: date, nullable: true }
        activa: { type: boolean }
        medico_tratante: { type: string, nullable: true }
        observaciones: { type: string, nullable: true }
        sesiones:
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/SesionRehabilitacion'

    # ── SesionRehabilitacion ───────────────────────────────
    SesionRehabilitacion:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        lesion: { type: string, format: uuid }
        ejercicios_realizados: { type: string }
        duracion_minutos: { type: integer, nullable: true }
        dolor_nivel:
          type: integer
          minimum: 0
          maximum: 10
          nullable: true
        fecha_sesion: { type: string, format: date }
        fisioterapeuta: { type: string, nullable: true }
        observaciones: { type: string, nullable: true }

    # ── PlanAlimenticio ────────────────────────────────────
    PlanAlimenticio:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        jugador: { type: string, format: uuid }
        descripcion_dieta: { type: string, nullable: true }
        calorias_totales: { type: integer, nullable: true }
        proteina_gr: { type: integer, nullable: true }
        carbohidratos_gr: { type: integer, nullable: true }
        grasas_gr: { type: integer, nullable: true }
        hidratacion_ml: { type: integer, nullable: true }
        fecha_inicio: { type: string, format: date }
        fecha_fin: { type: string, format: date, nullable: true }
        nutricionista: { type: string, nullable: true }
        activo: { type: boolean }

    # ── Paginación ─────────────────────────────────────────
    PaginatedResponse:
      type: object
      properties:
        count: { type: integer }
        next: { type: string, format: uri, nullable: true }
        previous: { type: string, format: uri, nullable: true }
        results:
          type: array
          items: {}

security:
  - BearerAuth: []

paths:
  # ─────────────────────────────────────────────────────────
  # HEALTH
  # ─────────────────────────────────────────────────────────
  /health/:
    get:
      tags: [Health]
      summary: Estado del servicio
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  version: { type: string, example: "1.0" }

  # ─────────────────────────────────────────────────────────
  # AUTH
  # ─────────────────────────────────────────────────────────
  /auth/register/:
    post:
      tags: [Auth]
      summary: Registro de nuevo usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        "201":
          description: Usuario creado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        "400":
          description: Datos inválidos

  /auth/login/:
    post:
      tags: [Auth]
      summary: Login — obtener tokens JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        "200":
          description: Tokens + datos de usuario
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        "401":
          description: Credenciales inválidas

  /auth/token/refresh/:
    post:
      tags: [Auth]
      summary: Renovar access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TokenRefreshRequest' }
      responses:
        "200":
          description: Nuevo access token
          content:
